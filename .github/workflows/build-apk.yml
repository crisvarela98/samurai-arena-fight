name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config cmake libffi-dev libssl-dev zlib1g-dev libncurses-dev
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install buildozer cython

      - name: Cache Buildozer downloads
        uses: actions/cache@v4
        with:
          path: |
            client/.buildozer
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('client/buildozer.spec', 'client/p4a-recipes/**') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: samurai-arena-fight-apk
          path: client/bin/*.apk
          if-no-files-found: error
          retention-days: 14
