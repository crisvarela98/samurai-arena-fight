name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUTF8: "1"
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            ccache \
            cmake \
            gettext \
            git \
            libffi-dev \
            libltdl-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            libtinfo6 \
            libtool \
            openjdk-17-jdk \
            patch \
            pkg-config \
            unzip \
            zip \
            zlib1g-dev
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "buildozer==1.5.0" "Cython==0.29.34"

      - name: Cache Buildozer downloads
        uses: actions/cache@v4
        with:
          path: |
            client/.buildozer
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('client/buildozer.spec', 'client/p4a-recipes/**') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: samurai-arena-fight-apk
          path: client/bin/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Buildozer logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: samurai-arena-fight-buildozer-logs
          path: |
            client/.buildozer/**/*.log
            client/.buildozer/android/platform/build-*/dists/*/*.txt
          if-no-files-found: ignore
          retention-days: 14
